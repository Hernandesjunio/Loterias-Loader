# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy dotnet core project to Azure Function App - fct-loterias-loader

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'output' # pasta com o conteúdo publicado para deploy
  FUNCTIONAPP_PROJECT_PATH: 'src/FunctionApp/Lotofacil.Loader.FunctionApp.csproj'
  SOLUTION_PATH: 'Lotofacil.Loader.slnx'
  DOTNET_VERSION: '8.0.x' # o projeto alvo está em net8.0

jobs:
  test:
    name: Testes (.NET)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependências (solução)
        run: dotnet restore '${{ env.SOLUTION_PATH }}'

      - name: Executar testes (Release)
        run: >
          dotnet test '${{ env.SOLUTION_PATH }}'
          --configuration Release
          --no-restore
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --results-directory "${{ runner.temp }}/TestResults"

      - name: Publicar resultados de teste (TRX)
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-results-trx
          path: '${{ runner.temp }}/TestResults/**/*.trx'
          if-no-files-found: warn

  build-and-deploy:
    name: Build e deploy
    runs-on: windows-latest
    needs: test
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: pwsh
        run: |
          dotnet restore '${{ env.FUNCTIONAPP_PROJECT_PATH }}'
          dotnet publish '${{ env.FUNCTIONAPP_PROJECT_PATH }}' --configuration Release --output '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0CF58B7ECC16499EA04F0D309D25712D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1B121DAC3C764A50B3355E74F845532B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A2D6CFA06822472BA5F3F049BBF7783D }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'fct-loterias-loader'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          